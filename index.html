<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>INNO Texnopark — Dastgohlar platformasi</title>
  <meta name="description" content="INNO Texnopark laboratoriyalaridagi dastgohlar: holati, imkoniyatlari va QR kod orqali batafsil ma'lumot." />
  <meta name="theme-color" content="#0b2a5b" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="index.html">
        <span class="logo">IT</span>
        <span class="brand-text">
          <b>INNO Texnopark</b>
          <span>Dastgohlar platformasi</span>
        </span>
      </a>
      <nav class="nav">
        <a href="index.html" class="active">Katalog</a>
        <a href="admin.html">Admin</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="intro">
      <h1>Dastgohlar katalogi</h1>
      <p id="introMeta">Laboratoriyalardagi dastgohlar, ularning holati va imkoniyatlari.</p>
      <div class="stats" id="stats"></div>
    </section>

    <div class="toolbar">
      <div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"></path></svg>
        <input id="search" type="search" placeholder="Dastgoh nomi yoki modeli bo'yicha qidirish..." autocomplete="off" />
      </div>
      <div class="filters" id="labFilters"></div>
      <div class="filters" id="statusFilters">
        <button class="filter active" data-status="all">Barchasi</button>
        <button class="filter" data-status="ishlaydi">Ishchi holatida</button>
        <button class="filter" data-status="tamir">Ta'mirtalab</button>
      </div>
    </div>

    <div id="catalog"></div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div id="footMeta"></div>
      <div style="margin-top:6px;">Har bir dastgoh kartasidagi QR kodni skaner qilib batafsil ma'lumot oling.</div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/common.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
